kiosk_mode:
  hide_header: true
  hide_sidebar: true

views:
  - path: home
    title: Kitchen Tablet
    icon: mdi:tablet
    type: panel
    background: "center / cover no-repeat fixed url('/local/images/kitchen-bg.png')"
    cards:
      - type: custom:mod-card
        card_mod:
          style: |
            ha-card {
              padding: 8px 16px;
              background: linear-gradient(170deg, rgba(248, 247, 245, 0.95) 0%, rgba(240, 238, 235, 0.95) 100%);
              box-shadow: none;
              height: 100vh;
              display: flex;
              flex-direction: column;
              border-radius: 0;
            }
        card:
          type: vertical-stack
          cards:

            # ═══════════════════════════════════════
            # ROW 1: Status Bar
            # ═══════════════════════════════════════
            - type: grid
              columns: 5
              square: false
              cards:
                - type: custom:button-card
                  show_name: true
                  show_icon: false
                  show_state: false
                  name: "[[[ return new Date().toLocaleTimeString('en-US', {hour: 'numeric', minute: '2-digit'}); ]]]"
                  styles:
                    card:
                      - padding: 10px 6px
                      - height: 68px
                      - display: flex
                      - align-items: center
                      - justify-content: center
                      - background: '#1B2A4A'
                      - border-radius: 28px
                      - box-shadow: 0 2px 6px rgba(0,0,0,0.15)
                    name:
                      - font-size: 26px
                      - font-weight: 700
                      - color: white
                - type: custom:button-card
                  show_name: true
                  show_icon: false
                  show_state: false
                  name: "[[[ return new Date().toLocaleDateString('en-US', {weekday: 'short', month: 'short', day: 'numeric'}); ]]]"
                  styles:
                    card:
                      - padding: 10px 6px
                      - height: 68px
                      - display: flex
                      - align-items: center
                      - justify-content: center
                      - background: '#2D3748'
                      - border-radius: 28px
                      - box-shadow: 0 2px 6px rgba(0,0,0,0.15)
                    name:
                      - font-size: 26px
                      - font-weight: 700
                      - color: white
                - type: custom:button-card
                  entity: weather.tomorrow_io_home_daily
                  show_name: true
                  show_icon: true
                  show_state: false
                  icon: |
                    [[[
                      var c = entity.state;
                      if (c === 'sunny') return 'mdi:weather-sunny';
                      if (c === 'rainy') return 'mdi:weather-rainy';
                      if (c === 'snowy') return 'mdi:weather-snowy';
                      if (c === 'partlycloudy') return 'mdi:weather-partly-cloudy';
                      return 'mdi:weather-cloudy';
                    ]]]
                  name: |
                    [[[
                      var c = entity.state.replace('partlycloudy','Ptly Cld').replace('cloudy','Cloudy').replace('sunny','Sunny').replace('rainy','Rainy').replace('snowy','Snowy');
                      return c.charAt(0).toUpperCase() + c.slice(1) + ' · ' + entity.attributes.humidity + '%';
                    ]]]
                  styles:
                    card:
                      - padding: 6px
                      - height: 68px
                      - display: flex
                      - align-items: center
                      - justify-content: center
                      - background: '#C05621'
                      - border-radius: 28px
                      - box-shadow: 0 2px 6px rgba(0,0,0,0.15)
                    name:
                      - font-size: 22px
                      - font-weight: 600
                      - color: white
                    icon:
                      - width: 24px
                      - color: rgba(255,255,255,0.85)
                - type: custom:button-card
                  entity: sun.sun
                  show_name: true
                  show_icon: true
                  show_state: false
                  icon: mdi:weather-sunset-down
                  name: |
                    [[[
                      var d = new Date(entity.attributes.next_setting);
                      return '☀↓ ' + d.toLocaleTimeString('en-US', {hour: 'numeric', minute: '2-digit'});
                    ]]]
                  styles:
                    card:
                      - padding: 6px
                      - height: 68px
                      - display: flex
                      - align-items: center
                      - justify-content: center
                      - background: '#7C3AED'
                      - border-radius: 28px
                      - box-shadow: 0 2px 6px rgba(0,0,0,0.15)
                    name:
                      - font-size: 22px
                      - font-weight: 600
                      - color: white
                    icon:
                      - width: 24px
                      - color: rgba(255,255,255,0.85)
                - type: custom:button-card
                  entity: sun.sun
                  show_name: true
                  show_icon: true
                  show_state: false
                  icon: mdi:weather-sunset-up
                  name: |
                    [[[
                      var d = new Date(entity.attributes.next_rising);
                      return '☀↑ ' + d.toLocaleTimeString('en-US', {hour: 'numeric', minute: '2-digit'});
                    ]]]
                  styles:
                    card:
                      - padding: 6px
                      - height: 68px
                      - display: flex
                      - align-items: center
                      - justify-content: center
                      - background: '#D97706'
                      - border-radius: 28px
                      - box-shadow: 0 2px 6px rgba(0,0,0,0.15)
                    name:
                      - font-size: 22px
                      - font-weight: 600
                      - color: white
                    icon:
                      - width: 24px
                      - color: rgba(255,255,255,0.85)

            # ═══════════════════════════════════════
            # ROW 2: Main Content — Camera | Big Info
            # ═══════════════════════════════════════
            - type: horizontal-stack
              cards:
                # Camera — swap to package cam when package detected
                - type: conditional
                  conditions:
                    - condition: state
                      entity: binary_sensor.doorbell_package_detected
                      state: "off"
                  card:
                    type: custom:webrtc-camera
                    entity: camera.outside_doorbell
                    muted: true
                    background: true
                    card_mod:
                      style: |
                        ha-card {
                          overflow: hidden;
                          border-radius: 16px;
                          box-shadow: 0 2px 8px rgba(0,0,0,0.1);
                        }
                        video {
                          object-fit: cover !important;
                        }
                - type: conditional
                  conditions:
                    - condition: state
                      entity: binary_sensor.doorbell_package_detected
                      state: "on"
                  card:
                    type: custom:webrtc-camera
                    entity: camera.outside_doorbell_package
                    muted: true
                    background: true
                    card_mod:
                      style: |
                        ha-card {
                          overflow: hidden;
                          border-radius: 16px;
                          box-shadow: 0 2px 8px rgba(0,0,0,0.1);
                          border: 3px solid #D97706;
                        }
                        video {
                          object-fit: cover !important;
                        }

                # Right half — big glanceable info
                - type: vertical-stack
                  cards:
                    # Big temperatures — centered
                    - type: horizontal-stack
                      cards:
                        - type: custom:button-card
                          entity: sensor.kitchen_avg_temp
                          show_name: true
                          show_state: false
                          show_icon: false
                          name: |
                            [[[
                              var inside = (
                                parseFloat(states['sensor.kitchen_avg_temp'].state) +
                                parseFloat(states['sensor.living_room_avg_temp'].state) +
                                parseFloat(states['sensor.family_room_avg_temp'].state)
                              ) / 3;
                              return Math.round(inside) + '°';
                            ]]]
                          label: Inside
                          show_label: true
                          layout: label|name
                          styles:
                            grid:
                              - grid-template-areas: '"n" "l"'
                              - grid-template-rows: 1fr auto
                            card:
                              - padding: 12px 0
                              - display: flex
                              - align-items: center
                              - justify-content: center
                              - background: 'linear-gradient(135deg, #059669 0%, #047857 100%)'
                              - border-radius: 16px
                              - box-shadow: 0 3px 12px rgba(5,150,105,0.3)
                            name:
                              - font-size: 64px
                              - font-weight: bold
                              - color: white
                              - justify-self: center
                            label:
                              - font-size: 20px
                              - color: rgba(255,255,255,0.8)
                              - justify-self: center

                        - type: custom:button-card
                          entity: sensor.outside_avg_temp
                          show_name: true
                          show_state: false
                          show_icon: false
                          name: |
                            [[[
                              return Math.round(parseFloat(entity.state)) + '°';
                            ]]]
                          label: Outside
                          show_label: true
                          layout: label|name
                          styles:
                            grid:
                              - grid-template-areas: '"n" "l"'
                              - grid-template-rows: 1fr auto
                            card:
                              - padding: 12px 0
                              - display: flex
                              - align-items: center
                              - justify-content: center
                              - background: 'linear-gradient(135deg, #2563EB 0%, #1D4ED8 100%)'
                              - border-radius: 16px
                              - box-shadow: 0 3px 12px rgba(37,99,235,0.3)
                            name:
                              - font-size: 64px
                              - font-weight: bold
                              - color: white
                              - justify-self: center
                            label:
                              - font-size: 20px
                              - color: rgba(255,255,255,0.8)
                              - justify-self: center

                    # Locks — compact button-card style
                    - type: horizontal-stack
                      cards:
                        - type: custom:button-card
                          entity: lock.front_door_deadbolt
                          name: Front Door
                          show_state: true
                          show_icon: true
                          tap_action:
                            action: toggle
                          icon: |
                            [[[
                              return entity.state === 'locked' ? 'mdi:lock' : 'mdi:lock-open';
                            ]]]
                          styles:
                            card:
                              - padding: 12px
                              - border-radius: 16px
                              - box-shadow: |
                                  [[[
                                    return entity.state === 'locked' ? '0 3px 12px rgba(5,150,105,0.25)' : '0 3px 12px rgba(220,38,38,0.25)';
                                  ]]]
                              - background: |
                                  [[[
                                    return entity.state === 'locked' ? 'linear-gradient(135deg, #059669 0%, #047857 100%)' : 'linear-gradient(135deg, #DC2626 0%, #B91C1C 100%)';
                                  ]]]
                            name:
                              - font-size: 22px
                              - font-weight: bold
                              - color: white
                            state:
                              - font-size: 16px
                              - text-transform: capitalize
                              - color: rgba(255,255,255,0.8)
                            icon:
                              - width: 32px
                              - color: rgba(255,255,255,0.9)
                        - type: custom:button-card
                          entity: lock.basement_door_deadbolt
                          name: Basement
                          show_state: true
                          show_icon: true
                          tap_action:
                            action: toggle
                          icon: |
                            [[[
                              return entity.state === 'locked' ? 'mdi:lock' : 'mdi:lock-open';
                            ]]]
                          styles:
                            card:
                              - padding: 12px
                              - border-radius: 16px
                              - box-shadow: |
                                  [[[
                                    return entity.state === 'locked' ? '0 3px 12px rgba(5,150,105,0.25)' : '0 3px 12px rgba(220,38,38,0.25)';
                                  ]]]
                              - background: |
                                  [[[
                                    return entity.state === 'locked' ? 'linear-gradient(135deg, #059669 0%, #047857 100%)' : 'linear-gradient(135deg, #DC2626 0%, #B91C1C 100%)';
                                  ]]]
                            name:
                              - font-size: 22px
                              - font-weight: bold
                              - color: white
                            state:
                              - font-size: 16px
                              - text-transform: capitalize
                              - color: rgba(255,255,255,0.8)
                            icon:
                              - width: 32px
                              - color: rgba(255,255,255,0.9)

                    # Lights + Mail + Covers — 3 columns
                    - type: horizontal-stack
                      cards:
                        - type: custom:button-card
                          entity: light.kitchen_lights
                          show_name: true
                          show_state: false
                          show_icon: true
                          icon: mdi:lightbulb-group
                          name: |
                            [[[
                              var count = Object.values(states).filter(e =>
                                e.entity_id.startsWith('light.') &&
                                e.state === 'on' &&
                                !e.attributes.entity_id
                              ).length;
                              return count + ' Lights';
                            ]]]
                          tap_action:
                            action: navigate
                            navigation_path: /kitchen-tablet/lights
                          styles:
                            card:
                              - padding: 12px
                              - border-radius: 16px
                              - box-shadow: 0 3px 10px rgba(217,119,6,0.2)
                              - background: 'linear-gradient(135deg, #F59E0B 0%, #D97706 100%)'
                            name:
                              - font-size: 24px
                              - font-weight: bold
                              - color: white
                            icon:
                              - width: 28px
                              - color: rgba(255,255,255,0.9)
                        - type: custom:button-card
                          entity: input_boolean.mail_arrived
                          show_name: true
                          show_state: false
                          show_icon: true
                          icon: |
                            [[[
                              return entity.state === 'on' ? 'mdi:mailbox-up' : 'mdi:mailbox-outline';
                            ]]]
                          name: |
                            [[[
                              return entity.state === 'on' ? 'Mail!' : 'No Mail';
                            ]]]
                          tap_action:
                            action: none
                          styles:
                            card:
                              - padding: 12px
                              - border-radius: 16px
                              - box-shadow: |
                                  [[[
                                    return entity.state === 'on' ? '0 3px 10px rgba(161,98,7,0.25)' : '0 2px 8px rgba(0,0,0,0.08)';
                                  ]]]
                              - background: |
                                  [[[
                                    return entity.state === 'on' ? 'linear-gradient(135deg, #A16207 0%, #854D0E 100%)' : 'rgba(0,0,0,0.04)';
                                  ]]]
                            name:
                              - font-size: 24px
                              - font-weight: bold
                              - color: |
                                  [[[
                                    return entity.state === 'on' ? 'white' : '#555';
                                  ]]]
                            icon:
                              - width: 28px
                              - color: |
                                  [[[
                                    return entity.state === 'on' ? 'rgba(255,255,255,0.9)' : '#999';
                                  ]]]
                        - type: custom:button-card
                          show_name: true
                          show_state: false
                          show_icon: true
                          icon: mdi:blinds-horizontal
                          name: |
                            [[[
                              var open = Object.values(states).filter(e =>
                                e.entity_id.startsWith('cover.') &&
                                e.state === 'open' &&
                                !e.attributes.entity_id
                              ).length;
                              var closed = Object.values(states).filter(e =>
                                e.entity_id.startsWith('cover.') &&
                                e.state === 'closed' &&
                                !e.attributes.entity_id
                              ).length;
                              if (open === 0) return 'All Closed';
                              return open + ' Shades Open';
                            ]]]
                          tap_action:
                            action: none
                          styles:
                            card:
                              - padding: 12px
                              - border-radius: 16px
                              - box-shadow: 0 3px 10px rgba(37,99,235,0.2)
                              - background: 'linear-gradient(135deg, #3B82F6 0%, #2563EB 100%)'
                            name:
                              - font-size: 24px
                              - font-weight: bold
                              - color: white
                            icon:
                              - width: 28px
                              - color: rgba(255,255,255,0.9)

                    # Energy graph
                    - type: horizontal-stack
                      cards:
                        - type: custom:mini-graph-card
                          entities:
                            - entity: sensor.home_energy_meter_gen5_electric_consumption_w_3
                              color: '#60A5FA'
                          name: Power
                          hours_to_show: 6
                          points_per_hour: 4
                          aggregate_func: max
                          line_width: 3
                          height: 40
                          font_size: 80
                          show:
                            graph: line
                            labels: false
                            name: true
                            state: true
                            icon: false
                            fill: fade
                          color_thresholds:
                            - value: 0
                              color: '#34D399'
                            - value: 2000
                              color: '#60A5FA'
                            - value: 5000
                              color: '#FBBF24'
                            - value: 8000
                              color: '#F87171'
                          card_mod:
                            style: |
                              ha-card {
                                background: #1E293B !important;
                                border-radius: 16px;
                                box-shadow: 0 3px 12px rgba(0,0,0,0.2);
                                --primary-text-color: white;
                                --secondary-text-color: rgba(255,255,255,0.6);
                              }
                        - type: custom:mini-graph-card
                          entities:
                            - entity: sensor.core_400s_series_pm2_5
                              color: '#34D399'
                          name: Air Quality
                          hours_to_show: 6
                          points_per_hour: 10
                          aggregate_func: max
                          line_width: 3
                          height: 40
                          font_size: 80
                          show:
                            graph: line
                            labels: false
                            name: true
                            state: true
                            icon: false
                            fill: fade
                          color_thresholds:
                            - value: 0
                              color: '#34D399'
                            - value: 25
                              color: '#FBBF24'
                            - value: 50
                              color: '#F87171'
                          card_mod:
                            style: |
                              ha-card {
                                background: #1E293B !important;
                                border-radius: 16px;
                                box-shadow: 0 3px 12px rgba(0,0,0,0.2);
                                --primary-text-color: white;
                                --secondary-text-color: rgba(255,255,255,0.6);
                              }

            # ═══════════════════════════════════════
            # ROW 3: Context Cards (only when relevant)
            # ═══════════════════════════════════════

            # Laundry — each machine visible when running/paused OR recently done (30 min linger)
            - type: horizontal-stack
              cards:
                - type: conditional
                  conditions:
                    - condition: or
                      conditions:
                        - condition: state
                          entity: sensor.washer_washer_machine_state
                          state_not: unavailable
                        - condition: state
                          entity: input_boolean.washer_recently_done
                          state: 'on'
                  card:
                    type: custom:button-card
                    entity: sensor.washer_remaining_time
                    show_name: true
                    show_state: false
                    show_icon: true
                    icon: mdi:washing-machine
                    layout: icon_name
                    name: |
                      [[[
                        var machine = states['sensor.washer_washer_machine_state'];
                        if (machine.state === 'run') {
                          var text = entity.state;
                          var mins = 0;
                          var hm = text.match(/(\d+)\s*hour/);
                          var mm = text.match(/(\d+)\s*minute/);
                          if (hm) mins += parseInt(hm[1]) * 60;
                          if (mm) mins += parseInt(mm[1]);
                          if (mins > 0) {
                            var est = Math.round(mins * 1.3);
                            return 'Washer: ~' + est + 'm (' + mins + 'm est)';
                          }
                          return 'Washer: ' + text;
                        }
                        if (machine.state === 'pause') return 'Washer: Paused';
                        var done = states['input_boolean.washer_recently_done'];
                        if (done.state === 'on') {
                          var changed = new Date(done.last_changed);
                          var mins = Math.round((Date.now() - changed.getTime()) / 60000);
                          if (mins < 1) return 'Washer: Just Done';
                          if (mins < 60) return 'Washer: Done ' + mins + 'm ago';
                          return 'Washer: Done ' + Math.floor(mins/60) + 'h ago';
                        }
                        return 'Washer: Done';
                      ]]]
                    styles:
                      card:
                        - padding: 10px 16px
                        - background: |
                            [[[
                              var st = states['sensor.washer_washer_machine_state'].state;
                              if (st === 'run') return 'linear-gradient(135deg, #3B82F6 0%, #2563EB 100%)';
                              if (st === 'pause') return 'linear-gradient(135deg, #F59E0B 0%, #D97706 100%)';
                              return 'linear-gradient(135deg, #10B981 0%, #059669 100%)';
                            ]]]
                        - border-radius: 16px
                        - box-shadow: |
                            [[[
                              var st = states['sensor.washer_washer_machine_state'].state;
                              if (st === 'run') return '0 3px 12px rgba(37,99,235,0.3)';
                              if (st === 'pause') return '0 3px 12px rgba(217,119,6,0.3)';
                              return '0 3px 12px rgba(5,150,105,0.3)';
                            ]]]
                      grid:
                        - grid-template-areas: '"i n"'
                        - grid-template-columns: min-content auto
                        - justify-content: center
                        - column-gap: 8px
                      icon:
                        - width: 36px
                        - color: rgba(255,255,255,0.9)
                      name:
                        - font-size: 36px
                        - font-weight: bold
                        - color: white
                        - justify-self: start
                - type: conditional
                  conditions:
                    - condition: or
                      conditions:
                        - condition: state
                          entity: sensor.dryer_dryer_machine_state
                          state_not: unavailable
                        - condition: state
                          entity: input_boolean.dryer_recently_done
                          state: 'on'
                  card:
                    type: custom:button-card
                    entity: sensor.dryer_remaining_time
                    show_name: true
                    show_state: false
                    show_icon: true
                    icon: mdi:tumble-dryer
                    layout: icon_name
                    name: |
                      [[[
                        var machine = states['sensor.dryer_dryer_machine_state'];
                        if (machine.state === 'run') return 'Dryer: ' + entity.state;
                        if (machine.state === 'pause') return 'Dryer: Paused';
                        var done = states['input_boolean.dryer_recently_done'];
                        if (done.state === 'on') {
                          var changed = new Date(done.last_changed);
                          var mins = Math.round((Date.now() - changed.getTime()) / 60000);
                          if (mins < 1) return 'Dryer: Just Done';
                          if (mins < 60) return 'Dryer: Done ' + mins + 'm ago';
                          return 'Dryer: Done ' + Math.floor(mins/60) + 'h ago';
                        }
                        return 'Dryer: Done';
                      ]]]
                    styles:
                      card:
                        - padding: 10px 16px
                        - background: |
                            [[[
                              var st = states['sensor.dryer_dryer_machine_state'].state;
                              if (st === 'run') return 'linear-gradient(135deg, #EF4444 0%, #DC2626 100%)';
                              if (st === 'pause') return 'linear-gradient(135deg, #F59E0B 0%, #D97706 100%)';
                              return 'linear-gradient(135deg, #10B981 0%, #059669 100%)';
                            ]]]
                        - border-radius: 16px
                        - box-shadow: |
                            [[[
                              var st = states['sensor.dryer_dryer_machine_state'].state;
                              if (st === 'run') return '0 3px 12px rgba(220,38,38,0.3)';
                              if (st === 'pause') return '0 3px 12px rgba(217,119,6,0.3)';
                              return '0 3px 12px rgba(5,150,105,0.3)';
                            ]]]
                      grid:
                        - grid-template-areas: '"i n"'
                        - grid-template-columns: min-content auto
                        - justify-content: center
                        - column-gap: 8px
                      icon:
                        - width: 36px
                        - color: rgba(255,255,255,0.9)
                      name:
                        - font-size: 36px
                        - font-weight: bold
                        - color: white
                        - justify-self: start

            # Alarm Armed
            - type: conditional
              conditions:
                - condition: state
                  entity: alarm_control_panel.alarm
                  state_not: disarmed
              card:
                type: alarm-panel
                states:
                  - arm_away
                entity: alarm_control_panel.alarm

            # Package
            - type: conditional
              conditions:
                - condition: state
                  entity: binary_sensor.doorbell_package_detected
                  state: "on"
              card:
                type: custom:mushroom-template-card
                primary: "Package at front door"
                icon: mdi:package-variant
                icon_color: amber
                card_mod:
                  style: |
                    ha-card {
                      --card-primary-font-size: 28px;
                      background: rgba(232, 137, 12, 0.08);
                      border-radius: 16px;
                      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
                    }
                    .primary { color: #B36B00 !important; }

            # Windows Open
            - type: conditional
              conditions:
                - condition: state
                  entity: binary_sensor.house_windows
                  state: "on"
              card:
                type: custom:mushroom-template-card
                primary: >
                  {{ expand(state_attr('binary_sensor.house_windows', 'entity_id')) | selectattr('state', 'eq', 'on') | list | count }} Window{{ 's' if expand(state_attr('binary_sensor.house_windows', 'entity_id')) | selectattr('state', 'eq', 'on') | list | count > 1 else '' }} Open
                icon: mdi:window-open-variant
                icon_color: cyan
                card_mod:
                  style: |
                    ha-card {
                      --card-primary-font-size: 28px;
                      background: rgba(0, 150, 200, 0.08);
                      border-radius: 16px;
                      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
                    }
                    .primary { color: #007A9E !important; }

            # Doors Open
            - type: conditional
              conditions:
                - condition: state
                  entity: binary_sensor.exterior_doors
                  state: "on"
              card:
                type: custom:mushroom-template-card
                primary: "Exterior Door Open"
                icon: mdi:door-open
                icon_color: red
                card_mod:
                  style: |
                    ha-card {
                      --card-primary-font-size: 28px;
                      background: rgba(255, 69, 58, 0.08);
                      border-radius: 16px;
                      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
                    }
                    .primary { color: #D42020 !important; }

            # ═══════════════════════════════════════
            # ROW 4: Quick Actions (always at bottom)
            # ═══════════════════════════════════════
            - type: grid
              columns: 4
              square: false
              cards:
                - type: custom:button-card
                  name: Goodnight
                  icon: mdi:weather-night
                  tap_action:
                    action: call-service
                    service: script.goodnight_routine
                  styles:
                    card:
                      - padding: 12px
                      - font-size: 18px
                      - color: white
                      - border-radius: 16px
                      - box-shadow: 0 3px 10px rgba(99,102,241,0.25)
                      - background: 'linear-gradient(135deg, #6366F1 0%, #4F46E5 100%)'
                    icon:
                      - width: 36px
                      - height: 36px
                      - color: rgba(255,255,255,0.9)

                - type: custom:button-card
                  name: Lights Off
                  icon: mdi:lightbulb-off
                  tap_action:
                    action: call-service
                    service: light.turn_off
                    service_data:
                      entity_id: all
                  styles:
                    card:
                      - padding: 12px
                      - font-size: 18px
                      - color: white
                      - border-radius: 16px
                      - box-shadow: 0 3px 10px rgba(217,119,6,0.25)
                      - background: 'linear-gradient(135deg, #F59E0B 0%, #D97706 100%)'
                    icon:
                      - width: 36px
                      - height: 36px
                      - color: rgba(255,255,255,0.9)

                - type: custom:button-card
                  name: Lock All
                  icon: mdi:lock
                  tap_action:
                    action: call-service
                    service: lock.lock
                    service_data:
                      entity_id:
                        - lock.front_door_deadbolt
                        - lock.basement_door_deadbolt
                  styles:
                    card:
                      - padding: 12px
                      - font-size: 18px
                      - color: white
                      - border-radius: 16px
                      - box-shadow: 0 3px 10px rgba(5,150,105,0.25)
                      - background: 'linear-gradient(135deg, #10B981 0%, #059669 100%)'
                    icon:
                      - width: 36px
                      - height: 36px
                      - color: rgba(255,255,255,0.9)

                - type: custom:button-card
                  name: Cameras
                  icon: mdi:cctv
                  tap_action:
                    action: navigate
                    navigation_path: /kitchen-tablet/cameras
                  styles:
                    card:
                      - padding: 12px
                      - font-size: 18px
                      - color: white
                      - border-radius: 16px
                      - box-shadow: 0 3px 10px rgba(71,85,105,0.25)
                      - background: 'linear-gradient(135deg, #64748B 0%, #475569 100%)'
                    icon:
                      - width: 36px
                      - height: 36px
                      - color: rgba(255,255,255,0.9)

