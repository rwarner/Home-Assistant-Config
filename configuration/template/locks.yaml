####################################
####### LOCK CONFIGURATION  ########
####################################

- lock:
    - name: Front Door Deadbolt
      unique_id: front_door_deadbolt
      lock:
        - action: input_boolean.turn_on
          target:
            entity_id:
              - input_boolean.front_door_deadbolt
      unlock:
        - action: input_boolean.turn_off
          target:
            entity_id:
              - input_boolean.front_door_deadbolt
      state: "{{ is_state('input_boolean.front_door_deadbolt', 'on') }}"