################################
####  TEMPLATE - LAUNDRY  ######
################################
- sensor:
  - name: "Washer Remaining Time"
    unique_id: washer_remaining_time
    state: >-
      {% set comp_time = as_timestamp(states('sensor.washer_washer_completion_time'), default=0) %}
      {% set delta = comp_time - as_timestamp(now()) %}
      {% set total_mins = (delta / 60) | int(0) %}
      {% if not is_state('sensor.washer_washer_machine_state', 'run') or delta <= 0 %}
        Not Running
      {% elif total_mins >= 60 %}
        {{ total_mins // 60 }} hour(s) and {{ total_mins % 60 }} minute(s)
      {% else %}
        {{ total_mins }} minute(s)
      {% endif %}

