#################################################
###  TEMPLATE - Average Temperature for rooms ###
#################################################
- sensor:

# Define below multiple sensors into one
# only rely on these sensors for automations and views


# -- Outside --
  - name: "Outside Temperature"
    unique_id: outside_avg_temp
    unit_of_measurement: '°F'
    state_class: measurement
    state: >-
      {{ state_attr('weather.tomorrow_io_home_daily', 'temperature') | float(65.0) }}

# -- Movie Room --
  - name: "Movie Room Temperature"
    unique_id: movie_room_avg_temp
    unit_of_measurement: '°F'
    state_class: measurement
    state: >-
      {{ '%0.3g'|format(float(states('sensor.movie_room_motion_sensor_temperature'), 65.0)) }}

# -- Laundry Room --
  - name: "Laundry Room Temperature"
    unique_id: laundry_room_avg_temp
    unit_of_measurement: '°F'
    state_class: measurement
    state: "{{ state_attr('climate.ecobee_laundry_room', 'current_temperature') }}"

# -- Kitchen --
  - name: "Kitchen Temperature"
    unique_id: kitchen_avg_temp
    unit_of_measurement: '°F'
    state_class: measurement
    state: >-
      {{'%0.3g'|format(
      (
        float(states('sensor.kitchen_motion_sensor_temperature'), 65.0) +
        float(states('sensor.kitchen_window_sensor_temperature'), 65.0) +
        float(states('sensor.master_bedroom_nspanel_temperature'), 65.0)
      ) / 3) }}


#  -- Master Bedroom --
  - name: "Master Bedroom Temperature"
    unique_id: master_bedroom_avg_temp
    unit_of_measurement: '°F'
    state_class: measurement
    state: >-
      {{'%0.3g'|format(
      (
        float(states('sensor.ryans_bedside_button_temperature'), 65.0) +
        float(states('sensor.bedroom_light_button_temperature'), 65.0) +
        float(states('sensor.master_bedroom_motion_sensor_temperature'), 65.0)  
      ) / 3) }}

# -- Nursery --
  - name: "Nursery Temperature"
    unique_id: nursery_avg_temp
    unit_of_measurement: '°F'
    state_class: measurement
    state: >-
      {{'%0.3g'|format(
      (
        float(states('sensor.nursery_motion_sensor_temperature'), 65.0) +
        float(states('sensor.nursery_light_button_temperature'), 65.0)
      ) / 2) }}

# -- Ryan's Office --
  - name: "Ryan's Office Temperature"
    unique_id: ryans_office_avg_temp
    unit_of_measurement: '°F'
    state_class: measurement
    state: >-
      {{'%0.3g'|format(
      (
        float(states('sensor.ryans_office_motion_sensor_temperature'), 65.0) +
        float(states('sensor.ryans_office_door_sensor_temperature'), 65.0) +
        float(states('sensor.ryans_office_nspanel_temperature'), 65.0)
      ) / 3) }}

#  -- Family Room --
  - name: "Family Room Temperature"
    unique_id: family_room_avg_temp
    unit_of_measurement: '°F'
    state_class: measurement
    state: "{{ state_attr('climate.family_room_mitsubishi', 'current_temperature') | float(65.0) }}"

#  -- Living Room --
  - name: "Living Room Temperature"
    unique_id: living_room_avg_temp
    unit_of_measurement: '°F'
    state_class: measurement
    state: >-
      {{'%0.3g'|format(
      (
        float(states('sensor.living_room_nspanel_temperature'), 65.0) +
        float(state_attr('climate.living_room_mitsubishi', 'current_temperature'), 65.0)
      ) / 2) }}

# -- 2nd Floor Average (Master Bedroom + Nursery + Office) --
  - name: "2nd Floor Average Temperature"
    unique_id: second_floor_avg_temp
    unit_of_measurement: '°F'
    state_class: measurement
    state: >-
      {{'%0.3g'|format(
      (
        float(states('sensor.master_bedroom_avg_temp'), 70.0) +
        float(states('sensor.nursery_avg_temp'), 70.0) +
        float(states('sensor.ryans_office_avg_temp'), 70.0)
      ) / 3) }}

# -- Attic vs Outside Delta (how much hotter attic is than outside) --
  - name: "Attic vs Outside Delta"
    unique_id: attic_outside_delta
    unit_of_measurement: '°F'
    state_class: measurement
    state: >-
      {{'%0.3g'|format(
        float(states('sensor.attic_gable_fan_temperature'), 80.0) -
        float(states('sensor.outside_avg_temp'), 70.0)
      ) }}

# -- Attic vs 2nd Floor Delta (attic heat pressure on bedrooms) --
  - name: "Attic vs 2nd Floor Delta"
    unique_id: attic_second_floor_delta
    unit_of_measurement: '°F'
    state_class: measurement
    state: >-
      {{'%0.3g'|format(
        float(states('sensor.attic_gable_fan_temperature'), 80.0) -
        float(states('sensor.second_floor_avg_temp'), 70.0)
      ) }}

# -- 2nd Floor vs Outside Delta (how much warmer indoors is than outside) --
  - name: "2nd Floor vs Outside Delta"
    unique_id: second_floor_outside_delta
    unit_of_measurement: '°F'
    state_class: measurement
    state: >-
      {{'%0.3g'|format(
        float(states('sensor.second_floor_avg_temp'), 70.0) -
        float(states('sensor.outside_avg_temp'), 70.0)
      ) }}

