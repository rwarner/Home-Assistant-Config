####################################
### SCRIPTS - Video Recording    ###
####################################

capture_front_door_video:
  alias: "Capture Front Door Video"
  mode: queued
  sequence:
    - action: camera.record
      data:
        entity_id: camera.outside_doorbell
        filename: '/tmp/hass/front_door_{{ now().strftime("%Y%m%d-%H%M%S") }}.mp4'
        duration: 15
        lookback: 2
