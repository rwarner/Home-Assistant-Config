##############################
### SCRIPTS - Alexa        ###
##############################

alexa_reset_all_volume:
  alias: Reset All Alexa Volume
  sequence:
    - action: media_player.volume_set
      data:
        entity_id:
          - media_player.ryans_office_echo_show
          - media_player.living_room_echo_dot
          - media_player.family_room_echo_dot
          - media_player.movie_room_echo
          - media_player.laundry_room_echo_dot
        volume_level: '0.6'
    - action: media_player.volume_set
      data:
        entity_id:
          - media_player.kitchen_echo_show_15
        volume_level: '0.7'

alexa_restart_home_assistant:
  alias: Restart Home Assistant
  sequence:
    - action: script.announce_local
      data:
        message: "Restarting Home Assistant. I'll be back in a minute."
    - delay:
        seconds: 3
    - action: homeassistant.restart

alexa_reload_automations:
  alias: Reload Automations
  sequence:
    - action: automation.reload
    - delay:
        seconds: 2
    - action: script.announce_local
      data:
        message: "Automations have been reloaded."
