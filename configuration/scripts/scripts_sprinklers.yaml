###### Sprinklers #######

# Zone 1: Sidewalk Strip
# Zone 2: Front Yard + Chimney
# Zone 3: Rear Corner
# Zone 4: Main Yard 1/2 + 1 Rear Head
# Zone 5: Main Yard 1/2 + 2 Mid Heads
# Zone 6: Back Drip Irrigation (N/A)
# Zone 7: Back Yard

run_all_sprinklers:
  alias: "Run All Sprinklers"
  mode: single
  sequence:
    # 1. Get fresh daily forecast
    - action: weather.get_forecasts
      data:
        type: daily
      target:
        entity_id: weather.tomorrow_io_home_daily
      response_variable: daily_forecasts

    # 2. Set variables *after* fetching fresh forecast
    - variables:
        fc: "{{ daily_forecasts['weather.tomorrow_io_home_daily'].forecast or [] }}"
        sprinkler_times: [20, 20, 15, 40, 40, 0, 5]

        # Seasonal multiplier: 0.0 in winter (Nov-Mar), 0.75 in spring/fall, 1.0 in summer
        seasonal_multiplier: >-
          {% set m = now().month %}
          {% if m in [11, 12, 1, 2, 3] %}
            0.0
          {% elif m in [4, 5, 9, 10] %}
            0.75
          {% else %}
            1.0
          {% endif %}

        # Upcoming rain in next 7 days from forecast (inches) — used to reduce run time if rain is coming
        upcoming_rain_forecast: >-
          {% set total = namespace(sum=0) %}
          {% for day in fc[:7] %}
            {% set total.sum = total.sum + (day.precipitation | default(0) | float) %}
          {% endfor %}
          {{ total.sum }}

        # Rain multiplier — reduce watering if significant rain is forecast this week
        rain_multiplier: >-
          {% if upcoming_rain_forecast >= 1.0 %} 0.0
          {% elif upcoming_rain_forecast >= 0.5 %} 0.5
          {% elif upcoming_rain_forecast >= 0.25 %} 0.75
          {% else %} 1.0
          {% endif %}

        # Forecast high temperature for today
        forecast_high: "{{ fc[0].temperature | float(0) }}"

        # Temperature multiplier — based on forecast high temp:
        # no watering below 45°F, reduced watering between 45–65°F
        temp_multiplier: >-
          {% if forecast_high < 45 %}
            0.0
          {% elif forecast_high < 55 %}
            0.5
          {% elif forecast_high < 65 %}
            0.75
          {% else %}
            1.0
          {% endif %}

        # Current humidity from fresh forecast's first day (default 50%)
        current_humidity: "{{ fc[0].humidity | default(50) | float }}"

        # Humidity multiplier — reduce watering if humidity is high (>80%)
        humidity_multiplier: >-
          {% if current_humidity > 80 %}
            0.8
          {% else %}
            1.0
          {% endif %}

        # Final multiplier combining all
        final_multiplier: >
          {{ (seasonal_multiplier | float) *
             (rain_multiplier | float) *
             (temp_multiplier | float) *
             (humidity_multiplier | float) }}

    # 3. Skip entirely if nothing would run — notify and exit
    - if:
        - condition: template
          value_template: "{{ final_multiplier <= 0 }}"
      then:
        - action: notify.ryan_devices
          data:
            title: "Sprinklers Skipped"
            message: >
              No zones ran today — conditions blocked watering.
              Seasonal: {{ seasonal_multiplier }}, Rain: {{ rain_multiplier }},
              Temp: {{ temp_multiplier }}, Humidity: {{ humidity_multiplier }}.
        - stop: "Final multiplier is 0, skipping all zones"

    # 4. Record last run date before zones start — survives HA restart mid-run
    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.last_sprinkler_run
      data:
        date: "{{ now().date() }}"

    # 5. Run sprinklers with adjusted times
    - repeat:
        count: 7
        sequence:
          - condition: template
            value_template: "{{ sprinkler_times[repeat.index - 1] > 0 }}"
          - variables:
              run_time: >
                {{ (sprinkler_times[repeat.index - 1] * final_multiplier)
                  | round(0) | int }}
          - action: rainbird.start_irrigation
            data:
              entity_id: "switch.rain_bird_sprinkler_{{ repeat.index }}"
              duration: "{{ run_time }}"
          - delay:
              minutes: "{{ run_time }}"