################################
### SCRIPTS - Harmony Hub    ###
################################

harmony_set_activity:
  alias: "Harmony Set Activity"
  fields:
    activity:
      description: "Harmony activity name (e.g. Watch Shield TV, Play PS4, Play Switch, PowerOff)"
  sequence:
    - action: remote.turn_on
      entity_id: remote.harmony_hub
      data:
        activity: "{{ activity }}"
