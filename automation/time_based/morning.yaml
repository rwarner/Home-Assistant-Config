############################
### TIME - Morning       ###
############################

# 6:00 a.m.
- alias: MORNING - Clear old TTS cache files
  id: 4e2b8c1a-9d3f-4b7e-a5c2-8f1d6e3a9b4c
  trigger:
    - trigger: time
      at: '06:00:00'
  action:
    - action: shell_command.clear_old_tts_cache

- alias: MORNING - Reset first_movement_ryans_office to off
  id: caff6d18-7815-11ee-b962-0242ac120002
  trigger:
    - trigger: time
      at: '06:00:00'
  action:
    - action: homeassistant.turn_off
      entity_id: input_boolean.first_movement_ryans_office

- alias: "MORNING - Re-enable bedroom motion light automation if disabled"
  id: 66bed98d-e52f-4864-9434-45b2186f1018
  trigger:
    - trigger: time
      at: "06:00:00"
  action:
    - choose:
        - conditions:
            - condition: state
              entity_id: automation.bedroom_turn_on_light_from_motion_off_after_5_min_between_10_am_and_9_30pm
              state: "off"
          sequence:
            - action: automation.turn_on
              target:
                entity_id: automation.bedroom_turn_on_light_from_motion_off_after_5_min_between_10_am_and_9_30pm

# 8:00 a.m.
- alias: MORNING - Set all Alexa volume to 60% everyday
  id: cf4face8-7815-11ee-b962-0242ac120002
  trigger:
    - trigger: time
      at: '08:00:00'
  action:
    - action: script.alexa_reset_all_volume

# 8:00 a.m.
- alias: MORNING - Reset mailbox input_boolean to off
  id: d366c2b2-7815-11ee-b962-0242ac120002
  trigger:
    - trigger: time
      at: '08:00:00'
  action:
    - action: homeassistant.turn_off
      entity_id: input_boolean.mail_arrived

