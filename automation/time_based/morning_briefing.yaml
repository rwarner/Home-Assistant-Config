##################################
### TIME - Morning Briefing    ###
##################################

- alias: MORNING - Morning briefing on first kitchen motion
  id: 1a4c7e3b-6d8f-4a2e-b9c5-2f3d8e7a1b6c
  mode: single
  trigger:
    - trigger: state
      entity_id: binary_sensor.kitchen_motion_sensor
      from: "off"
      to: "on"
  condition:
    # Only between 7:30am and 10am
    - condition: time
      after: "07:30:00"
      before: "10:00:00"
    # Only once per day — check last triggered
    - condition: template
      value_template: >
        {% set lt = this.attributes.last_triggered %}
        {{ lt is none or lt < today_at('00:00:00') }}
    # Someone is home
    - condition: state
      entity_id: sensor.family_status
      state: 'Home'
  action:
    - delay: "00:00:03"

    # Get today's forecast
    - action: weather.get_forecasts
      target:
        entity_id: weather.tomorrow_io_home_daily
      data:
        type: daily
      response_variable: forecast

    # Announce on kitchen Echo Show (Alexa announce plays built-in chime first)
    - action: notify.alexa_media_kitchen_echo_show_15
      data:
        data:
          type: announce
        message: >
          {% set today = forecast['weather.tomorrow_io_home_daily']['forecast'][0] %}
          {% set high = today.temperature | round(0) %}
          {% set condition = today.condition %}
          {% set precip = today.precipitation_probability | int(0) %}
          Good morning.

          It's currently {{ states('sensor.outside_avg_temp') | round(0) }} degrees outside
          with a high of {{ high }} today.
          {% if condition == 'rainy' %}
          Rainy skies with a {{ precip }} percent chance of rain.
          {% elif condition == 'snowy' %}
          Snow expected with a {{ precip }} percent chance.
          {% elif condition == 'sunny' %}
          Sunny skies ahead.
          {% elif condition == 'partlycloudy' %}
          Partly cloudy skies today.
          {% elif condition == 'cloudy' %}
          Cloudy skies today.
          {% else %}
          {{ condition | replace('-', ' ') | title }} skies today.
          {% endif %}

          {% if is_state('binary_sensor.house_windows', 'on') %}
            {% set open_windows = expand(state_attr('binary_sensor.house_windows', 'entity_id'))
              | selectattr('state', 'eq', 'on')
              | map(attribute='name')
              | map('replace', ' Sensor', '')
              | list %}
          {{ open_windows | join(' and ') }} {{ 'is' if open_windows | count == 1 else 'are' }} still open from last night.
          {% endif %}

          {% set plex = states('sensor.tautilli_data') %}
          {% if plex not in [' ', 'unknown', 'unavailable'] %}
            {% set items = plex.split(', ') %}
            {% if items | count > 2 %}
          {{ items | count }} things were added to Plex while you were asleep.
            {% elif items | count == 2 %}
          {{ items[0].split(' - ')[0] }} and {{ items[1].split(' - ')[0] }} were added to Plex overnight.
            {% else %}
          {{ items[0].split(' - ')[0] }} was added to Plex while you were asleep.
            {% endif %}
          {% endif %}

          {% set closers = [
            "Have a great day.",
            "Make it a good one.",
            "Go get 'em today.",
            "Hope today is a good one.",
            "Enjoy your day, everyone.",
            "Make today count.",
            "Here's to a productive day.",
            "Wishing you all a wonderful day.",
            "Time to seize the day.",
            "Let's make today awesome.",
            "Have a fantastic day ahead.",
            "Today is going to be a good one.",
            "Go out there and crush it.",
            "Enjoy every minute today.",
            "Hope the day treats you well.",
            "Ready, set, go. Have a great day.",
            "May the coffee be strong and the day be short.",
            "Another beautiful day. Make the most of it.",
            "Wishing you smooth sailing today.",
            "You've got this. Have an amazing day."
          ] %}
          {{ closers | random }}

    # Clear Plex additions after announcing
    - action: variable.update_sensor
      data:
        value: " "
      target:
        entity_id: sensor.tautilli_data
