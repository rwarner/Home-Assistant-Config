################################
### LOGIC - Dark Outside     ###
################################

- alias: GOING DARK - Set dark_outside On (evening, once/day)
  id: d8a964ba-7814-11ee-b962-0242ac120002
  mode: single
  trigger:
    # Daily safety check at 3pm so we always evaluate at least once
    - trigger: time
      at: "15:00:00"

    # Clear sky: fires ~7:10-7:15 PM in late May, adjusts naturally with seasons
    - trigger: numeric_state
      entity_id: sun.sun
      attribute: elevation
      below: 14
      for: "00:05:00"

    # Cloudy/overcast: fires ~6:35-6:45 PM in late May (sun still up but dim)
    - trigger: numeric_state
      entity_id: sun.sun
      attribute: elevation
      below: 25
      for: "00:05:00"

    # --- OLD: hardware lux fallback (front outdoor motion sensor) ---
    # Replaced because sensor dies repeatedly and was triggering too early
    # on clear days (500 lux = mid-afternoon ambient, not actual darkness).
    # Uncomment to re-enable if a reliable outdoor lux sensor is added.
    # - trigger: numeric_state
    #   entity_id: sensor.front_outdoor_motion_sensor_illuminance
    #   below: 500
    #   for: "00:05:00"

  condition:
    # Only after 3 PM
    - condition: template
      value_template: "{{ now() >= today_at('15:00:00') }}"

    # Only if it's currently not marked dark
    - condition: state
      entity_id: input_boolean.dark_outside
      state: "off"

    # Is it dark enough? Guards the 3pm time trigger.
    # Clear days: elevation < 14°
    # Cloudy/stormy days: elevation < 25° (earlier trigger when overcast)
    - condition: or
      conditions:
        - condition: numeric_state
          entity_id: sun.sun
          attribute: elevation
          below: 14
        - condition: template
          value_template: >
            {{ state_attr('sun.sun', 'elevation') | float < 25
               and states('weather.tomorrow_io_home_daily') in
               ['cloudy', 'fog', 'rainy', 'pouring', 'lightning',
                'lightning-rainy', 'snowy', 'exceptional'] }}
        # --- OLD: lux condition ---
        # - condition: numeric_state
        #   entity_id: sensor.front_outdoor_motion_sensor_illuminance
        #   below: 500

    # Only once per calendar day
    - condition: template
      value_template: >
        {% set lt = state_attr('automation.going_dark_set_dark_outside_input_boolean_to_on_dark_out', 'last_triggered') %}
        {{ lt is none or lt < today_at('00:00:00') }}

  action:
    - action: homeassistant.turn_on
      target:
        entity_id: input_boolean.dark_outside


- alias: GOING LIGHT - Set dark_outside input_boolean to Off, bright out
  id: dedd58d2-7814-11ee-b962-0242ac120002
  mode: single
  trigger:
    - trigger: numeric_state
      entity_id: sun.sun
      attribute: elevation
      above: 6
      for: "00:10:00"
  condition:
    - condition: time
      after: "05:30:00"
      before: "13:00:00"
    - condition: state
      entity_id: input_boolean.dark_outside
      state: "on"
  action:
    - action: homeassistant.turn_off
      target:
        entity_id: input_boolean.dark_outside
