############################
### SECURITY - Locks     ###
############################


# Checking for if Ryan / Kelly / All_devices has changed within the last 10 minutes
# or if sensor.family_status is "Away" and our phones haven't connected to WiFi yet
# Only if it's currently "dark_outside"

- alias: LOCKS - When unlocking the door, turn on lights inside if before/after sun and nobody is home
  id: 2ab660a4-7816-11ee-b962-0242ac120002
  max_exceeded: silent # Hide warnings when triggered while in delay.
  trigger:
    - trigger: state
      entity_id: lock.front_door_deadbolt
      from: locked
      to: unlocked
  condition:
    - condition: and
      conditions:
        - condition: or
          conditions:
            - condition: template
              value_template: >-
                {{
                (as_timestamp(now())-as_timestamp(states.sensor.kelly_status.last_changed))
                < 600 }}
            - condition: template
              value_template: >-
                {{
                (as_timestamp(now())-as_timestamp(states.sensor.ryan_status.last_changed))
                < 600 }}
            - condition: template
              value_template: >-
                {{
                (as_timestamp(now())-as_timestamp(states.sensor.family_status.last_changed))
                < 600 }}
            - condition: state
              entity_id: sensor.family_status
              state: Away
        - condition: state
          entity_id: input_boolean.dark_outside
          state: "on"
  action:
    - action: light.turn_on
      continue_on_error: true
      entity_id: light.living_room_lights
    # Wait until someone walks into the Kitchen
    - wait_template: "{{ is_state('binary_sensor.kitchen_motion_sensor', 'on') }}"
    - action: scene.turn_on
      data:
        entity_id: scene.evening_lights_home
        transition: 5


- alias: LOCKS - When unlocking the door, Alexa welcome home
  id: 30735d30-7816-11ee-b962-0242ac120002
  trigger:
    - trigger: state
      entity_id: lock.front_door_deadbolt
      from: locked
      to: unlocked
  condition:
    - condition: and
      conditions:
        # Ignore any unlocks if the door has unlocked in the last 10 minutes
        - condition: template
          value_template: >-
            {{ (as_timestamp(now())-as_timestamp(trigger.from_state.last_changed))
            > 600 }}
        - condition: or
          conditions:
            # If in the last ten minutes, either phones have changed or the group family has changed.
            # Or if nobody is home at all when entering (typical)
            - condition: template
              value_template: >-
                {{
                (as_timestamp(now())-as_timestamp(states.sensor.kelly_status.last_changed))
                < 600 }}
            - condition: template
              value_template: >-
                {{
                (as_timestamp(now())-as_timestamp(states.sensor.ryan_status.last_changed))
                < 600 }}
            - condition: template
              value_template: >-
                {{
                (as_timestamp(now())-as_timestamp(states.sensor.family_status.last_changed))
                < 600 }}
            - condition: state
              entity_id: sensor.family_status
              state: Away
  action:
    - wait_template: "{{ is_state('binary_sensor.kitchen_motion_sensor', 'on') }}"
    - delay:
        seconds: 10
    - variables:
        ryan: "{{ states('sensor.ryan_status') }}"
        kelly: "{{ states('sensor.kelly_status') }}"
        both_here: "{{ ryan in ['Just Arrived', 'Home'] and kelly in ['Just Arrived', 'Home'] }}"
    - action: script.announce_local
      data:
        # Allow announcement past 9pm if both people are arriving home together
        override: "{{ both_here }}"
        message: >
          {% if both_here %} Welcome home, Ryan and Kelly!
          {% elif ryan == 'Just Arrived' %} Welcome home, Ryan!
          {% elif kelly == 'Just Arrived' %} Welcome home, Kelly!
          {% else %} Welcome home!
          {% endif %}

          {% set inside = (
            states('sensor.kitchen_avg_temp') | float(65) +
            states('sensor.living_room_avg_temp') | float(65) +
            states('sensor.family_room_avg_temp') | float(65)
          ) / 3 %}
          It's {{ inside | round(0) }} degrees inside
          and {{ states('sensor.outside_avg_temp') | round(0) }} outside.

          {% set open_windows = expand(state_attr('binary_sensor.house_windows', 'entity_id'))
            | selectattr('state', 'eq', 'on')
            | map(attribute='name')
            | map('replace', ' Sensor', '')
            | list %}
          {% if open_windows | count > 0 %}
          {{ open_windows | join(', ') }} {{ 'is' if open_windows | count == 1 else 'are' }} open.
          {% endif %}

          {% set washer_done = is_state('sensor.washer_washer_machine_state', 'stop') %}
          {% set dryer_done = is_state('sensor.dryer_dryer_machine_state', 'stop') %}
          {% if washer_done and dryer_done %}
          The washer and dryer both finished while you were out.
          {% elif washer_done %}
          The washer finished while you were out.
          {% elif dryer_done %}
          The dryer finished while you were out.
          {% endif %}

          {% set plex = states('sensor.tautilli_data') %}
          {% if plex not in [' ', 'unknown', 'unavailable'] %}
            {% set items = plex.split(', ') %}
            {% if items | count > 2 %}
          {{ items | count }} things were added to Plex while you were away.
            {% elif items | count == 2 %}
          {{ items[0].split(' - ')[0] }} and {{ items[1].split(' - ')[0] }} were added to Plex.
            {% else %}
          {{ items[0].split(' - ')[0] }} was added to Plex while you were away.
            {% endif %}
          {% endif %}
    
    #Reset variable after using it for announcement
    - action: variable.update_sensor
      data:
        value: " "
      target:
        entity_id: sensor.tautilli_data