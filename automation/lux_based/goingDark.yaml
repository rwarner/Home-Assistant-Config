############################
### LUX - Going Dark     ###
############################

#   Turn on Family Room Lights, Outside to 100%
#   turn off unneeded lights if nobody is home
- alias: GOING DARK - Turn on lights when outside gets dark
  id: 4c3cbda0-7815-11ee-b962-0242ac120002
  trigger:
    # Make sure that it's dark outside
    - trigger: state
      entity_id: input_boolean.dark_outside
      to: "on"
  condition:
    # Only proceed, if we haven't used this in the last 12 hours
    - condition: template
      value_template: >-
        {{ this.attributes.last_triggered is none
           or (as_timestamp(now()) - as_timestamp(this.attributes.last_triggered)) > 43200 }}
  action:
  # If we are away, turn on away scene
  - choose:
      - conditions:
          - condition: state
            entity_id: alarm_control_panel.alarm
            state: armed_away
        sequence:
          - action: scene.turn_on
            data:
              entity_id: scene.evening_lights_away
              transition: 10
    # Otherwise, default to home scene
    default:
      - action: scene.turn_on
        data:
          entity_id: scene.evening_lights_home
          transition: 10

- alias: GOING DARK - Close all curtains and shades when it's getting dark
  id: 5f9f9787-3108-4c69-997b-ba7fbdee9285
  trigger:
    # Reliable: close curtains at actual sunset — sun.sun below_horizon
    # corresponds exactly to when outdoor lux drops to ~20 (near-darkness).
    # Adjusts with the season, requires no hardware.
    - trigger: state
      entity_id: sun.sun
      to: "below_horizon"

    # --- OLD: hardware lux trigger (front outdoor motion sensor) ---
    # Was triggering at ~20 lux = essentially sunset anyway, but failed
    # whenever the sensor battery died. Replaced by sun.sun above.
    # - trigger: numeric_state
    #   entity_id: sensor.front_outdoor_motion_sensor_illuminance
    #   below: 20
    # --- OLD: dark_outside boolean (commented out in original) ---
    # - trigger: state
    #   entity_id: input_boolean.dark_outside
    #   to: "on"

  action:
    - action: cover.close_cover
      entity_id: cover.house_covers
