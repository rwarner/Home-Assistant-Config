- alias: ALERT - UPS Power State
  id: b5af027a-ede3-4b55-9fe3-4cdca51c3c80
  mode: queued
  trigger:
    # On battery
    - trigger: template
      id: battery
      value_template: "{{ 'On Battery' in states('sensor.ups_status') }}"
      for: "00:00:30"

    # Power restored: only fire if we were previously on battery
    - trigger: state
      id: online
      entity_id: sensor.ups_status
      from: "On Battery"
      # any non-battery state, including "Online, Battery Charging" and "Online"
      for: "00:00:30"
  action:
    - choose:
        - conditions: "{{ trigger.id == 'battery' }}"
          sequence:
            - action: notify.ryan_devices
              data:
                title: "Home Power Outage"
                message: >
                  UPS Battery Runtime: {{ states('sensor.ups_battery_runtime') }} minutes
        - conditions: "{{ trigger.id == 'online' }}"
          sequence:
            - action: notify.ryan_devices
              data:
                title: "Home Power Online"
                message: "Power has returned"

- alias: ALERT - Low battery on sensor, notify Mobile App
  id: 3c4cf9b0-7814-11ee-b962-0242ac120002
  mode: single
  trigger:
    - trigger: template
      value_template: >
        {% set ns = namespace(low_batt=[]) %}
        {% for entity in expand(label_entities("Monitor Battery Level")) %}
          {% if entity.state | float(0) < 30 and entity.state | float(0) > 0 %}
            {% set ns.low_batt = ns.low_batt + [entity] %}
          {% endif %}
        {% endfor %}
        {{ ns.low_batt | count > 0 }}
  condition: []
  action:
    - action: notify.ryan_devices
      data:
        title: "Low Battery Alert"
        message: >
          {% set ns = namespace(low_batt=[]) %}
          {% for entity in expand(label_entities("Monitor Battery Level")) %}
            {% if entity.state | float(0) < 30 and entity.state | float(0) > 0 %}
              {% set ns.low_batt = ns.low_batt + [entity] %}
            {% endif %}
          {% endfor %}
          {{ ns.low_batt | count }} sensor(s) need batteries: {{ ns.low_batt | map(attribute='name') | join(', ') }}
        data:
          url: /lovelace/devices_view

- alias: ALERT - Battery Sensors Unavailable, Notify Mobile App
  id: 43a40884-7814-11ee-b962-0242ac120002
  mode: single
  trigger:
    # Trigger whenever the computed count sensor changes.
    # The "for" ensures the NEW state (count) is stable for 5 minutes before firing.
    - trigger: state
      entity_id: sensor.unavailable_battery_count
      for:
        minutes: 5
  variables:
    # Convert state strings to ints safely
    to_count: "{{ trigger.to_state.state | int(0) }}"
    from_count: "{{ trigger.from_state.state | int(0) if trigger.from_state else 0 }}"
    # Grab the current list of unavailable names from the sensor attributes
    unavailable_names: "{{ state_attr('sensor.unavailable_battery_count', 'names') or [] }}"
    unavailable_entity_ids: "{{ state_attr('sensor.unavailable_battery_count', 'entity_ids') or [] }}"
  condition:
    # 1) Do nothing if the new count is 0 (this is your "avoid when we return to 0")
    - condition: template
      value_template: "{{ to_count > 0 }}"

    # 2) Only notify when the count INCREASES (e.g., another device went unavailable)
    #    This prevents spam when it stays the same or decreases.
    - condition: template
      value_template: "{{ to_count > from_count }}"
  action:
    - action: notify.ryan_devices
      data:
        title: "Devices Unavailable"
        message: >
          {{ to_count }} device(s) unavailable:
          {{ unavailable_names | join(', ') }}
        data:
          url: /lovelace/devices_view
          ttl: 0
          priority: high


- alias: ALERT - Notify when the physical mail comes
  id: 48cfaaa2-7814-11ee-b962-0242ac120002
  trigger:
    - trigger: state
      entity_id: binary_sensor.mailbox_sensor
      to: "on"
  condition:
    - condition: state
      entity_id: input_boolean.mail_arrived
      state: "off"
  action:
    - action: notify.ryan_devices
      data:
        # UTF-8 issue as of 2022.8
        #title: "\uD83D\uDCEB\uD83D\uDCEB  Mail has arrived  \uD83D\uDCEB\uD83D\uDCEB"
        title: Mail has arrived
        message: ""
    - action: script.announce_local
      data:
        message: "You've got mail"
    - action: homeassistant.turn_on
      entity_id: input_boolean.mail_arrived

- alias: ALERT - Water detected on moisture sensor, notify mobile app
  id: 4db93146-7814-11ee-b962-0242ac120002
  trigger:
    - trigger: state
      entity_id: 
        - binary_sensor.downstairs_bathroom_water_sensor_moisture
        - binary_sensor.kitchen_water_sensor_moisture
        - binary_sensor.laundry_water_sensor_moisture
      from: "off"
      to: "on"
  action:
    - action: script.announce_local
      data:
        message: "Water detected: {{ trigger.to_state.attributes.friendly_name }}"
    - action: notify.ryan_devices
      data:
        title: "Water detected"
        message: "{{ trigger.to_state.attributes.friendly_name }}"
        data:
          ttl: 0
          priority: high



