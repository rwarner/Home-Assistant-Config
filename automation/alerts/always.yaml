- alias: "ALERT - Home Assistant Successfully Started"
  id: 50cedff8-4cd9-4d85-9ea9-dc1726324335
  trigger:
    - trigger: homeassistant
      event: start
  action:
    - action: script.announce_local
      data:
        message: "Home Assistant, online"

