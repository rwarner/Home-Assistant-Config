############################
### NURSERY AUTOMATIONS  ###
############################

############ Motion Sensor #############
- alias: NURSERY - Light Control from Motion (nursery before 1030pm, bookshelf after)
  id: 9542bf88-292c-4af8-b6f0-c3fd3dfbb6b0
  mode: restart
  max_exceeded: silent

  trigger:
    # Motion starts
    - trigger: state
      entity_id: binary_sensor.nursery_motion_sensor
      from: "off"
      to: "on"

    # No motion for 30 minutes
    - trigger: state
      entity_id: binary_sensor.nursery_motion_sensor
      from: "on"
      to: "off"
      for:
        minutes: 30

  action:
    - choose:
        # -----------------------
        # MOTION ON
        # -----------------------
        - conditions:
            - condition: template
              value_template: "{{ trigger.to_state.state == 'on' }}"
            - condition: numeric_state
              entity_id: sensor.nursery_motion_sensor_illuminance
              below: 10
          sequence:
            - choose:
                # 8:00am -> 10:30pm
                # Both lights in Nursery
                #
                # Goal: FIRST motion-trigger AFTER 8:00am sets a default brightness (80%).
                # After that, we just turn the lights on normally (restoring last settings).
                #
                # How we detect "first after 8am" WITH a helper:
                # - input_boolean.nursery_daytime_initialized == off  -> first trigger after 8:00am
                # - set it to on after we apply brightness_pct: 80
                - conditions:
                    - condition: time
                      after: "08:00:00"
                      before: "22:30:00"
                  sequence:
                    - choose:
                        # FIRST trigger after 8:00am -> force default brightness, then mark initialized
                        - conditions:
                            - condition: state
                              entity_id: input_boolean.nursery_daytime_initialized
                              state: "off"
                          sequence:
                            - action: light.turn_on
                              target:
                                entity_id: light.nursery_lights
                              data:
                                brightness_pct: 80  # <-- "start of daytime" brightness
                            - action: input_boolean.turn_on
                              target:
                                entity_id: input_boolean.nursery_daytime_initialized
                      default:
                        # Subsequent triggers (same day after 8am) -> restore last light brightness
                        - action: light.turn_on
                          target:
                            entity_id: light.nursery_lights

                # 10:30pm -> 8:00am (spans midnight): bookshelf lamp @ 10%
                # BUT: don't switch if nursery lights are already on
                - conditions:
                    - condition: or
                      conditions:
                        - condition: time
                          after: "22:30:00"
                        - condition: time
                          before: "08:00:00"
                    - condition: state
                      entity_id: light.nursery_lights
                      state: "off"
                  sequence:
                    - action: light.turn_on
                      target:
                        entity_id: light.nursery_bookshelf_lamp
                      data:
                        brightness_pct: 10

        # -----------------------
        # MOTION OFF (30 min)
        # -----------------------
        - conditions:
            - condition: template
              value_template: "{{ trigger.to_state.state == 'off' }}"
          sequence:
            - action: light.turn_off
              target:
                entity_id:
                  - light.nursery_lights
                  - light.nursery_bookshelf_lamp
#####################################
