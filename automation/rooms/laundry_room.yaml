##############################
### ROOM - Laundry Room    ###
##############################

- alias: LAUNDRY - Track washer running
  id: a1b2c3d4-laun-wash-running-trk01
  mode: restart
  trigger:
    - trigger: state
      entity_id: sensor.washer_washer_machine_state
      to: 'run'
      for:
        minutes: 5
  action:
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.washer_running

- alias: LAUNDRY - Announce washer done
  id: 98b90d3c-7815-11ee-b962-0242ac120002
  mode: restart
  trigger:
    - trigger: state
      entity_id: sensor.washer_washer_machine_state
      from: 'run'
      to: 'stop'
  action:
    - action: script.announce_washer_done

- alias: LAUNDRY - Track dryer running
  id: a1b2c3d4-laun-dryr-running-trk01
  mode: restart
  trigger:
    - trigger: state
      entity_id: sensor.dryer_dryer_machine_state
      to: 'run'
      for:
        minutes: 5
  action:
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.dryer_running

- alias: LAUNDRY - Announce dryer done
  id: 9c564aa4-7815-11ee-b962-0242ac120002
  mode: restart
  trigger:
    - trigger: state
      entity_id: sensor.dryer_dryer_machine_state
      from: 'run'
      to: 'stop'
  action:
    - action: script.announce_dryer_done

- alias: LAUNDRY - Resume washer monitoring after restart
  id: a1b2c3d4-laun-wash-resume-rst01
  mode: single
  trigger:
    - trigger: homeassistant
      event: start
  condition:
    - condition: state
      entity_id: input_boolean.washer_running
      state: 'on'
  action:
    - wait_for_trigger:
        - trigger: state
          entity_id: sensor.washer_washer_machine_state
          to: 'stop'
      timeout: "04:00:00"
      continue_on_timeout: false
    - action: script.announce_washer_done

- alias: LAUNDRY - Resume dryer monitoring after restart
  id: a1b2c3d4-laun-dryr-resume-rst01
  mode: single
  trigger:
    - trigger: homeassistant
      event: start
  condition:
    - condition: state
      entity_id: input_boolean.dryer_running
      state: 'on'
  action:
    - wait_for_trigger:
        - trigger: state
          entity_id: sensor.dryer_dryer_machine_state
          to: 'stop'
      timeout: "04:00:00"
      continue_on_timeout: false
    - action: script.announce_dryer_done

- alias: LAUNDRY - Track washer recently done
  id: a1b2c3d4-laun-wash-done-track0001
  mode: restart
  trigger:
    - trigger: state
      entity_id: sensor.washer_washer_machine_state
      from: 'run'
      to: 'stop'
  action:
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.washer_recently_done
    - delay:
        minutes: 30
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.washer_recently_done

- alias: LAUNDRY - Clear recently done when running
  id: a1b2c3d4-laun-done-clear-combined
  mode: parallel
  max_exceeded: silent
  trigger:
    - trigger: state
      entity_id: sensor.washer_washer_machine_state
      to: 'run'
      id: washer
    - trigger: state
      entity_id: sensor.dryer_dryer_machine_state
      to: 'run'
      id: dryer
  action:
    - choose:
        - conditions: "{{ trigger.id == 'washer' }}"
          sequence:
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.washer_recently_done
        - conditions: "{{ trigger.id == 'dryer' }}"
          sequence:
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.dryer_recently_done

- alias: LAUNDRY - Track dryer recently done
  id: a1b2c3d4-laun-dryr-done-track001
  mode: restart
  trigger:
    - trigger: state
      entity_id: sensor.dryer_dryer_machine_state
      from: 'run'
      to: 'stop'
  action:
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.dryer_recently_done
    - delay:
        minutes: 30
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.dryer_recently_done

- alias: LAUNDRY - Weekly summary and reset counters
  id: 5c9d2e4f-7a3b-4c8d-b1e5-6f2a8d4c9b3e
  trigger:
    - trigger: time
      at: '19:00:00'
  condition:
    - condition: time
      weekday:
        - sun
    - condition: state
      entity_id: sensor.family_status
      state: 'Home'
  action:
    - action: notify.ryan_devices
      data:
        title: "Weekly Laundry Summary"
        message: >
          This week: {{ states('counter.weekly_washer_cycles') }} wash
          {{ 'cycle' if states('counter.weekly_washer_cycles') | int == 1 else 'cycles' }}
          and {{ states('counter.weekly_dryer_cycles') }} dry
          {{ 'cycle' if states('counter.weekly_dryer_cycles') | int == 1 else 'cycles' }}.
    - action: counter.reset
      target:
        entity_id:
          - counter.weekly_washer_cycles
          - counter.weekly_dryer_cycles
