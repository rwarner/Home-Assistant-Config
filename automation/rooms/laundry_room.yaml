### ROOM - Laundry Room    ###
##############################

- alias: LAUNDRY - Announce washer done
  id: 98b90d3c-7815-11ee-b962-0242ac120002
  mode: restart
  trigger:
    - trigger: state
      entity_id: sensor.washer_washer_machine_state
      to: 'run'
      for:
        minutes: 5
  action:
    - wait_for_trigger:
        - trigger: state
          entity_id: sensor.washer_washer_machine_state
          from: 'run'
          to: 'stop'
      timeout: "04:00:00"
      continue_on_timeout: false
    - action: script.announce_local
      data:
        message: >
          The washer is done.
          {% if is_state('sensor.dryer_dryer_machine_state', 'run') %}
            The dryer has {{ states('sensor.dryer_remaining_time') }} remaining.
          {% endif %}
    - action: counter.increment
      target:
        entity_id: counter.weekly_washer_cycles

