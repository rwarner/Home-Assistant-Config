- alias: LAUNDRY - Track washer recently done
  id: a1b2c3d4-laun-wash-done-track0001
  mode: restart
  trigger:
    - trigger: state
      entity_id: sensor.washer_washer_machine_state
      from: 'run'
      to: 'stop'
  action:
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.washer_recently_done
    - delay:
        minutes: 30
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.washer_recently_done

- alias: LAUNDRY - Clear washer done when running
  id: a1b2c3d4-laun-wash-done-clear001
  mode: single
  max_exceeded: silent
  trigger:
    - trigger: state
      entity_id: sensor.washer_washer_machine_state
      to: 'run'
  action:
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.washer_recently_done

